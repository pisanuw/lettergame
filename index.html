<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <h1 id="game-title">Letter Game</h1>
      <p class="subtitle" id="game-subtitle">
        Take turns with the computer naming things in a category,
        one letter at a time — A all the way to Z.
      </p>
      <p class="subtitle" id="game-hints-note">You get <strong>3 hints</strong> per game.</p>

      <label class="field-label" id="lang-label" for="lang-select">Language</label>
      <select id="lang-select">
        <option value="en">English</option>
        <option value="tr">Turkce</option>
      </select>

      <label class="field-label" id="cat-label" for="category-select">Choose a category (or leave blank for a random one)</label>
      <select id="category-select">
        <option value="" id="pick-for-me-opt">Pick one for me</option>
      </select>
      <button id="start-btn" class="btn btn-primary">Start Game</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div class="game-wrap">

      <div class="game-header">
        <button id="home-btn" class="home-btn" title="Back to Home">&#8962; <span id="home-label">Home</span></button>
        <div class="header-center">
          <div class="category-label">Category</div>
          <div class="category-name" id="category-display"></div>
        </div>
        <div class="letter-badge" id="letter-display">A</div>
      </div>

      <div class="alphabet-row" id="alphabet"></div>

      <div class="word-history" id="word-history"></div>

      <div class="turn-section">
        <div class="turn-indicator" id="turn-indicator"></div>

        <div class="input-row" id="input-area">
          <input
            type="text"
            id="word-input"
            placeholder="Type your word&hellip;"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button class="btn btn-primary" id="submit-btn" style="width:auto;padding:10px 20px;"><span id="submit-label">Submit</span></button>
        </div>

        <div class="error-msg hidden" id="error-msg"></div>
        <div class="hint-text hidden" id="hint-text"></div>
      </div>

      <div class="action-row">
        <button class="btn btn-secondary" id="hint-btn"><span id="hint-label">Hint</span> <span id="hint-count">(3 left)</span></button>
        <button class="btn btn-secondary" id="quit-btn"><span id="quit-label">Quit</span></button>
      </div>

    </div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="screen">
    <div class="end-card">
      <div class="trophy">&#127881;</div>
      <h2 id="complete-heading">A to Z complete!</h2>
      <p class="end-category-label" id="end-category"></p>
      <div class="final-list" id="final-words"></div>

      <!-- Inline word suggestion -->
      <div id="suggest-section" class="suggest-section">
        <p class="suggest-prompt">Got a word we missed in <strong id="sug-category-name"></strong>?</p>

        <div id="suggest-form-wrap">
          <div class="sug-input-row">
            <input id="sug-word" type="text" placeholder="Type a missing word&hellip;" autocomplete="off" spellcheck="false">
          </div>
          <div id="sug-error" class="error-msg hidden"></div>
          <div class="sug-actions">
            <button id="sug-submit-btn" class="btn btn-primary" style="width:auto;">Suggest</button>
            <button id="sug-skip-btn" class="btn btn-secondary" style="width:auto;">Skip</button>
          </div>
        </div>

        <div id="suggest-success" class="hidden">
          <p class="success-msg">Thanks! Sent for review.</p>
        </div>
      </div>

      <div class="end-actions">
        <button class="btn btn-primary" id="play-again-btn"><span id="play-again-label">Play Again</span></button>
        <button class="btn btn-secondary" id="end-home-btn">&#8962; <span id="end-home-label">Home</span></button>
      </div>
    </div>
  </div>


  <footer class="site-footer">
    <a href="feedback.html">Send feedback</a>
  </footer>

  <script src="words.js"></script>
  <script src="hints.js"></script>
  <script src="words-tr.js"></script>
  <script src="hints-tr.js"></script>
  <script src="words-web.js"></script>
  <script src="i18n.js"></script>
  <script src="game.js"></script>
</body>
</html>
