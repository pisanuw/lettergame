<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <h1>Letter Game</h1>
      <p class="subtitle">
        Take turns with the computer naming things in a category,
        one letter at a time — A all the way to Z.
      </p>
      <label class="field-label" for="category-select">Choose a category (or leave blank for a random one)</label>
      <select id="category-select">
        <option value="">Pick one for me</option>
      </select>
      <button id="start-btn" class="btn btn-primary">Start Game</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div class="game-wrap">

      <div class="game-header">
        <div>
          <div class="category-label">Category</div>
          <div class="category-name" id="category-display"></div>
        </div>
        <div class="letter-badge" id="letter-display">A</div>
      </div>

      <div class="alphabet-row" id="alphabet"></div>

      <div class="word-history" id="word-history"></div>

      <div class="turn-section">
        <div class="turn-indicator" id="turn-indicator"></div>

        <div class="input-row" id="input-area">
          <input
            type="text"
            id="word-input"
            placeholder="Type your word&hellip;"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button class="btn btn-primary" id="submit-btn" style="width:auto;padding:10px 20px;">Submit</button>
        </div>

        <div class="error-msg hidden" id="error-msg"></div>
        <div class="hint-text hidden" id="hint-text"></div>
      </div>

      <div class="action-row">
        <button class="btn btn-secondary" id="hint-btn">Hint</button>
        <button class="btn btn-secondary" id="quit-btn">Quit</button>
      </div>

    </div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="screen">
    <div class="end-card">
      <div class="trophy">&#127881;</div>
      <h2>A to Z complete!</h2>
      <p class="end-category-label" id="end-category"></p>
      <div class="final-list" id="final-words"></div>
      <button class="btn btn-primary" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
